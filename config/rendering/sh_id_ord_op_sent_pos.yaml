version: 1

dimension_labels:
  clinical_benefit: "clinical benefit"
  safety: "safety"
  affordability: "affordability"
  convenience: "patient convenience"

blocks:
  # Options use sentences rendered as POSITIVE FRAMING:
  # Examples:
  # Delivers excellent clinical outcomes and high affordability, making it cost-effective for achieving strong therapeutic results. However, it offers moderate safety and requires significant lifestyle adjustments.
  #Provides excellent safety protections and good clinical outcomes, ensuring both effective treatment and low risk. However, it has moderate affordability and requires some lifestyle adjustments.
  # Offers excellent patient convenience and moderate clinical outcomes, making it easy to complete treatment. However, it has limited affordability and provides moderate safety protections.
  # Ensures excellent affordability and good patient convenience, making it accessible and easy to follow. However, it delivers limited clinical outcomes and lower safety protections.
  options:
    style: template
    line_prefix: ""
    sort_by: weight_desc
    include_scale_adjectives: true
    adjective_format: "{adjective} {label}"
    template: "Option {index} ensures {dim1} and {dim2}. However, it delievers {dim3} and provides {dim4}."

  # Stakeholder preferences rendered as ORDERED LIST with fixed dimension positions
  stakeholder_preferences:
    style: order
    line_prefix: "Stakeholder {index} priorities: "
    order_separator: " > "
    sort_by: weight_desc

  stakeholder_veto:
    style: "none_literal"
    none_literal: "None"
