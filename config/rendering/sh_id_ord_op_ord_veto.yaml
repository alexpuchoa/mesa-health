version: 1

# Baseline with veto.

dimension_labels:
  clinical_benefit: "Clinical benefit"
  safety: "Safety"
  affordability: "Affordability"
  convenience: "Patient convenience"

blocks:
  # Options ordered only (baseline)
  options:
    # Supported: order | weights
    style: order
    line_prefix: "Option {index}: "
    order_separator: " > "
    sort_by: weight_desc

  # Stakeholders anonymous, ordered only (baseline)
  stakeholder_preferences:
    # Supported: order | weights
    style: order
    line_prefix: "Stakeholder {index} priorities: "
    order_separator: " > "
    sort_by: weight_desc

  # Vetoes forseen! Stakeholder anonymous
  stakeholder_veto:
    style: scenario_veto_phrase
    line_prefix: "Stakeholder {index}: "
    item_format: "Options where {dimension_label} is weakest (ranked 4th) are unacceptable."
    none_literal: "None"
