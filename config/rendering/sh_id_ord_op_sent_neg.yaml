version: 1

dimension_labels:
  clinical_benefit: "clinical benefit"
  safety: "safety"
  affordability: "affordability"
  convenience: "patient convenience"

blocks:
  # Options use sentences rendered as NEGATIVE FRAMING:
  # Examples:
  # Offers only moderate safety and requires significant lifestyle adjustments, creating compliance challenges. However, it does deliver excellent clinical outcomes and maintains high affordability.
  # Has only moderate affordability and requires some lifestyle adjustments, which may limit accessibility. However, it provides excellent safety protections and good clinical outcomes.
  # Suffers from limited affordability and provides only moderate safety protections. However, it offers excellent patient convenience and achieves moderate clinical outcomes.
  # Delivers only limited clinical outcomes and lower safety protections, raising efficacy concerns. However, it ensures excellent affordability and good patient convenience.
  options:
    style: template
    line_prefix: ""
    sort_by: weight_desc
    include_scale_adjectives: true
    adjective_format: "{adjective} {label}"
    template: "Option {index} offers only {dim3} and {dim4}. However, it provides {dim1} and provides {dim2}."

  # Stakeholder preferences rendered as ORDERED LIST with fixed dimension positions
  stakeholder_preferences:
    style: order
    line_prefix: "Stakeholder {index} priorities: "
    order_separator: " > "
    sort_by: weight_desc

  stakeholder_veto:
    style: "none_literal"
    none_literal: "None"
